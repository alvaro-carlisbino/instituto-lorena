<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CRM comercial interno do Instituto Lorena Visentainer — kanban de vendas, gestão de leads e funil de captação." />
    <meta name="theme-color" content="#2e2f3d" />
    <meta name="color-scheme" content="light dark" />
    <meta property="og:title" content="Instituto Lorena CRM" />
    <meta property="og:description" content="CRM comercial interno — kanban de vendas, gestão de leads e funil de captação." />
    <meta property="og:type" content="website" />
    <!-- Abre a conexão TLS com o Supabase em paralelo ao download do JS: o primeiro
         fetch de dados (auth + snapshot) sai sem pagar o handshake (~100-300ms). -->
    <link rel="preconnect" href="https://fgyfpmnvlkmyxtucbxbu.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://fgyfpmnvlkmyxtucbxbu.supabase.co" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CRM" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Instituto Lorena CRM · INTERNO</title>
    <!-- Tema escuro antes do primeiro paint (evita flash claro); a UI vive em TopControls/useTheme. -->
    <script>
      try {
        if (localStorage.getItem('crm-theme') === 'dark') document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
